name: Deploy Dominion Alpha Engine

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Alpha Engine to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 300s
          script: |
            echo "===== STEP 1: PULL LATEST REPO ====="
            cd ~/desktop-tutorial
            git fetch origin main
            git reset --hard origin/main
            echo "repo synced"

            echo "===== STEP 2: CREATE ALPHA ENGINE DIR ====="
            mkdir -p ~/dominion/alpha_engine
            echo "dir ready: ~/dominion/alpha_engine"

            echo "===== STEP 3: COPY FILES (no overwrite of existing) ====="
            cp -rn ~/desktop-tutorial/alpha_engine/. ~/dominion/alpha_engine/ 2>/dev/null || true
            cp -r ~/desktop-tutorial/alpha_engine/dominion_alpha ~/dominion/alpha_engine/ 2>/dev/null || true
            cp ~/desktop-tutorial/alpha_engine/requirements.txt ~/dominion/alpha_engine/ 2>/dev/null || true
            cp ~/desktop-tutorial/alpha_engine/dominion-alpha.service ~/dominion/alpha_engine/ 2>/dev/null || true
            echo "files copied"

            echo "===== STEP 4: CREATE .env IF NOT EXISTS ====="
            if [ ! -f ~/dominion/alpha_engine/.env ]; then
              cp ~/dominion/alpha_engine/.env.example ~/dominion/alpha_engine/.env
              echo ".env created from example"
            else
              echo ".env already exists, skipping"
            fi

            echo "===== STEP 5: CREATE VENV ====="
            cd ~/dominion/alpha_engine
            python3 -m venv .venv
            echo "venv created"

            echo "===== STEP 6: INSTALL REQUIREMENTS ====="
            .venv/bin/pip install --quiet -r requirements.txt
            echo "requirements installed"
            .venv/bin/pip show fastapi uvicorn httpx | grep -E 'Name|Version'

            echo "===== STEP 7: RUN CLI SCAN ====="
            cd ~/dominion/alpha_engine
            .venv/bin/python -m dominion_alpha.cli scan-once 2>&1 | tail -30

            echo "===== STEP 8: INSTALL SYSTEMD SERVICE ====="
            sudo cp ~/dominion/alpha_engine/dominion-alpha.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable dominion-alpha
            sudo systemctl restart dominion-alpha
            sleep 5
            systemctl status dominion-alpha --no-pager | head -15

            echo "===== STEP 9: VERIFY PORT 8787 ====="
            sleep 5
            curl -sf http://localhost:8787/health && echo "HEALTH OK" || echo "health check failed"

            echo "DEPLOY COMPLETE"
