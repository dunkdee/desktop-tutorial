name: Baby CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GUMROAD_TOKEN,BREVO_API_KEY,YOUTUBE_API_KEY,YOUTUBE_CLIENT_ID,YOUTUBE_CLIENT_SECRET,OANDA_API_KEY,OANDA_ACCOUNT_ID,BINANCE_API_KEY,BINANCE_API_SECRET,TIKTOK_CLIENT_ID,TIKTOK_CLIENT_SECRET,N8N_TOOL_SECRET,ANTHROPIC_API_KEY
          script: |
            set -e
            echo "👑 Pulling latest code on VM..."
            cd ~/desktop-tutorial
            git fetch --all
            git reset --hard origin/main

            echo "👑 Writing .env from GitHub Secrets..."
            cat > .env <<ENV
            GUMROAD_TOKEN=${GUMROAD_TOKEN}
            BREVO_API_KEY=${BREVO_API_KEY}
            YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
            YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}
            YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}
            OANDA_API_KEY=${OANDA_API_KEY}
            OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
            BINANCE_API_KEY=${BINANCE_API_KEY}
            BINANCE_API_SECRET=${BINANCE_API_SECRET}
            TIKTOK_CLIENT_ID=${TIKTOK_CLIENT_ID}
            TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
            N8N_TOOL_SECRET=${N8N_TOOL_SECRET}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            ENV

            echo "👑 Restarting Docker stack..."
            docker compose down || true
            docker compose up -d --build

            echo "👑 Testing Baby API..."
            sleep 5
            curl -sf http://localhost:8080/ && echo " — root OK"
            curl -sf http://localhost:8080/gumroad && echo " — gumroad OK" || echo " — gumroad FAILED (check GUMROAD_TOKEN secret)"

            echo "👑 Testing Dominion Healing site..."
            curl -sf http://localhost/health && echo " — web OK" || true
