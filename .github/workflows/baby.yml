name: Baby CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to prod VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            echo "Writing .env..."
            cd ~/desktop-tutorial
            {
              printf 'GUMROAD_TOKEN=%s\n'               '${{ secrets.GUMROAD_TOKEN }}'
              printf 'BREVO_API_KEY=%s\n'               '${{ secrets.BREVO_API_KEY }}'
              printf 'YOUTUBE_API_KEY=%s\n'             '${{ secrets.YOUTUBE_API_KEY }}'
              printf 'YOUTUBE_CLIENT_ID=%s\n'           '${{ secrets.YOUTUBE_CLIENT_ID }}'
              printf 'YOUTUBE_CLIENT_SECRET=%s\n'       '${{ secrets.YOUTUBE_CLIENT_SECRET }}'
              printf 'OANDA_API_KEY=%s\n'               '${{ secrets.OANDA_API_KEY }}'
              printf 'OANDA_ACCOUNT_ID=%s\n'            '${{ secrets.OANDA_ACCOUNT_ID }}'
              printf 'BINANCE_API_KEY=%s\n'             '${{ secrets.BINANCE_API_KEY }}'
              printf 'BINANCE_API_SECRET=%s\n'          '${{ secrets.BINANCE_API_SECRET }}'
              printf 'TIKTOK_CLIENT_ID=%s\n'            '${{ secrets.TIKTOK_CLIENT_ID }}'
              printf 'TIKTOK_CLIENT_SECRET=%s\n'        '${{ secrets.TIKTOK_CLIENT_SECRET }}'
              printf 'ANTHROPIC_API_KEY=%s\n'           '${{ secrets.ANTHROPIC_API_KEY }}'
              printf 'GEMINI_API_KEY=%s\n'              '${{ secrets.GEMINI_API_KEY }}'
              printf 'GA4_MEASUREMENT_ID=%s\n'          '${{ secrets.GA4_MEASUREMENT_ID }}'
            } > .env
            echo ".env written"

            echo "Pulling latest code..."
            git pull origin main

            echo "Starting all services..."
            docker compose up -d --build

            sleep 10

            echo "Health checks..."
            curl -sf http://localhost:8080/ && echo "baby-api OK" || echo "baby-api FAILED"
            curl -sf http://localhost:80/health && echo "web OK" || echo "web FAILED"
