name: Cleanup Stale Containers + Redeploy

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove stale containers and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "=============================="
            echo "  REMOVE STALE CONTAINERS"
            echo "=============================="
            # Remove any container with baby-api, baby-logger, or dominion-web in name
            docker ps -a --filter "name=baby-api" -q | xargs -r docker rm -f && echo "Removed all baby-api containers" || true
            docker rm -f baby-logger 2>/dev/null && echo "Removed: baby-logger" || echo "No stale baby-logger"
            docker rm -f dominion-web 2>/dev/null && echo "Removed: dominion-web" || echo "No stale dominion-web"

            # Prune all stopped/created containers
            docker container prune -f 2>/dev/null | tail -2

            echo ""
            echo "=============================="
            echo "  GIT PULL LATEST"
            echo "=============================="
            cd ~/desktop-tutorial
            git pull origin main

            echo ""
            echo "=============================="
            echo "  DOCKER COMPOSE BUILD + UP"
            echo "=============================="
            docker compose up -d --build

            echo ""
            echo "=============================="
            echo "  VERIFY (up to 3 minutes)"
            echo "=============================="
            for i in $(seq 1 36); do
              sleep 5
              STATUS=$(curl -sf http://localhost:8080/ 2>/dev/null || true)
              if echo "$STATUS" | grep -q "LIVE"; then
                echo "✅ baby-api UP (attempt $i)"
                echo "$STATUS" | python3 -m json.tool 2>/dev/null || echo "$STATUS"
                break
              fi
              echo "  ... waiting (attempt $i/36)"
              if [ "$i" = "36" ]; then
                echo "❌ baby-api did not start in 180s"
                docker logs baby-api 2>&1 | tail -30 || true
                docker ps -a --filter "name=baby-api" 2>/dev/null || true
              fi
            done
