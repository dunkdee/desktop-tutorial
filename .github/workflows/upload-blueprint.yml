name: Upload Blueprint PDF to Gumroad

on:
  workflow_dispatch:
    inputs:
      token:
        description: Gumroad access token
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Blueprint PDF
        run: |
          pip install fpdf2 --quiet
          python3 scripts/gen_blueprint.py

      - name: Upload file to Gumroad product
        env:
          TOKEN: ${{ inputs.token }}
          PRODUCT_ID: "Rgc4gza-8hLx7YSIu3vBQA=="
        run: |
          echo "Uploading Blueprint PDF..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -F "access_token=$TOKEN" \
            -F "file=@/tmp/divine-sovereignty-blueprint.pdf;type=application/pdf" \
            "https://api.gumroad.com/v2/products/$PRODUCT_ID/product_files" 2>&1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: File attached to Gumroad product"
          else
            echo "product_files returned $HTTP_CODE - trying publish update"
            curl -s -X PUT \
              -d "access_token=$TOKEN&published=true" \
              "https://api.gumroad.com/v2/products/$PRODUCT_ID"
          fi

      - name: Verify product status
        env:
          TOKEN: ${{ inputs.token }}
          PRODUCT_ID: "Rgc4gza-8hLx7YSIu3vBQA=="
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.gumroad.com/v2/products/$PRODUCT_ID" | python3 -c "import json,sys; d=json.load(sys.stdin); p=d.get('product',{}); print('Name:',p.get('name')); print('Published:',p.get('published')); print('Files:',len(p.get('product_files',[]))); print('URL:',p.get('short_url'))"
