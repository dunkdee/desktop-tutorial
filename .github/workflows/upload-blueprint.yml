name: Upload Blueprint PDF to Gumroad

on:
  workflow_dispatch:
    inputs:
      token:
        description: Gumroad access token
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Blueprint PDF
        run: |
          pip install fpdf2 --quiet
          python3 scripts/gen_blueprint.py

      - name: Publish PDF as GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete blueprint-v1 --yes 2>/dev/null || true
          git push origin --delete refs/tags/blueprint-v1 2>/dev/null || true
          gh release create blueprint-v1 \
            --title "Divine Sovereignty Blueprint v1" \
            --notes "Product delivery file for Divine Sovereignty Blueprint"
          gh release upload blueprint-v1 /tmp/divine-sovereignty-blueprint.pdf --clobber
          echo "DOWNLOAD_URL=https://github.com/${{ github.repository }}/releases/download/blueprint-v1/divine-sovereignty-blueprint.pdf" >> $GITHUB_ENV
          echo "Release asset URL: https://github.com/${{ github.repository }}/releases/download/blueprint-v1/divine-sovereignty-blueprint.pdf"

      - name: Set delivery URL and publish on Gumroad
        env:
          TOKEN: ${{ inputs.token }}
          PRODUCT_ID: "Rgc4gza-8hLx7YSIu3vBQA=="
        run: |
          echo "Setting custom delivery URL and publishing..."
          curl -s -X PUT \
            -d "access_token=$TOKEN&url=$DOWNLOAD_URL&published=true" \
            "https://api.gumroad.com/v2/products/$PRODUCT_ID"

      - name: Verify product status
        env:
          TOKEN: ${{ inputs.token }}
          PRODUCT_ID: "Rgc4gza-8hLx7YSIu3vBQA=="
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.gumroad.com/v2/products/$PRODUCT_ID" | python3 -c "import json,sys; d=json.load(sys.stdin); p=d.get('product',{}); print('Name:',p.get('name')); print('Published:',p.get('published')); print('Delivery URL:',p.get('url')); print('Short URL:',p.get('short_url'))"
