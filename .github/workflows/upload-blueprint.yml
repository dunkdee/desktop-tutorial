name: Upload Blueprint PDF to Gumroad

on:
  workflow_dispatch:
    inputs:
      token:
        description: Gumroad access token
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Blueprint PDF
        run: |
          pip install fpdf2 --quiet
          python3 scripts/gen_blueprint.py

      - name: Publish PDF as GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete blueprint-v1 --yes 2>/dev/null || true
          git push origin --delete refs/tags/blueprint-v1 2>/dev/null || true
          gh release create blueprint-v1 --title "Divine Sovereignty Blueprint v1" --notes "Product delivery"
          gh release upload blueprint-v1 /tmp/divine-sovereignty-blueprint.pdf --clobber
          echo "PDF_URL=https://github.com/${{ github.repository }}/releases/download/blueprint-v1/divine-sovereignty-blueprint.pdf" >> $GITHUB_ENV

      - name: Try all Gumroad file upload approaches
        env:
          TOKEN: ${{ inputs.token }}
          PRODUCT_ID: "Rgc4gza-8hLx7YSIu3vBQA=="
          PERMALINK: "xnfyw"
        run: |
          echo "=== Attempt 1: product_files via permalink ==="
          curl -s -w "\nHTTP:%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@/tmp/divine-sovereignty-blueprint.pdf;type=application/pdf" \
            "https://api.gumroad.com/v2/products/$PERMALINK/product_files"
          echo ""
          echo "=== Attempt 2: product_files via ID with Bearer ==="
          curl -s -w "\nHTTP:%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -F "file=@/tmp/divine-sovereignty-blueprint.pdf;type=application/pdf" \
            "https://api.gumroad.com/v2/products/$PRODUCT_ID/product_files"
          echo ""
          echo "=== Attempt 3: PUT with url field (JSON body) ==="
          curl -s -w "\nHTTP:%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"$PDF_URL\",\"published\":true}" \
            "https://api.gumroad.com/v2/products/$PRODUCT_ID"
          echo ""
          echo "=== Attempt 4: PUT published only ==="
          curl -s -w "\nHTTP:%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -d "published=true" \
            "https://api.gumroad.com/v2/products/$PRODUCT_ID"
          echo ""

      - name: Verify
        env:
          TOKEN: ${{ inputs.token }}
          PRODUCT_ID: "Rgc4gza-8hLx7YSIu3vBQA=="
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.gumroad.com/v2/products/$PRODUCT_ID" | python3 -c "import json,sys; d=json.load(sys.stdin); p=d.get('product',{}); print('Published:',p.get('published')); print('Files:',len(p.get('files',[]))); print('Product files:',len(p.get('product_files',[]))); print('URL:',p.get('url')); print('Custom delivery:',p.get('custom_delivery_url'))"
