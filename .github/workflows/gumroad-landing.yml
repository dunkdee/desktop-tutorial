name: Publish Gumroad Landing Page

on:
  workflow_dispatch:
    inputs:
      token_override:
        description: 'Gumroad access token (leave blank to use secret)'
        required: false
        type: string

jobs:
  publish-landing:
    runs-on: ubuntu-latest
    env:
      GUMROAD_TOKEN: ${{ inputs.token_override || secrets.GUMROAD_TOKEN }}
      PRODUCT_ID: xnfyw
      LANDING_URL: https://dominionhealing.org/divine-sovereignty.html

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify landing page exists
        run: |
          [ -f web/public/divine-sovereignty.html ] && echo "✅ landing page present" || (echo "❌ missing" && exit 1)
          wc -l web/public/divine-sovereignty.html

      - name: Update Gumroad product description with landing page link
        run: |
          python3 -c "
          import os, requests, json

          token = os.environ['GUMROAD_TOKEN']
          pid   = os.environ['PRODUCT_ID']
          url   = os.environ['LANDING_URL']

          # Fetch current product
          r = requests.get(
              f'https://api.gumroad.com/v2/products/{pid}',
              params={'access_token': token}
          )
          d = r.json()
          if not d.get('success'):
              print('FAILED to fetch product:', d)
              exit(1)

          p = d['product']
          print('Product:', p['name'])
          print('Published:', p['published'])
          print('URL:', p.get('short_url'))

          # Append landing page notice to description
          landing_html = f'''
          <p style=\"text-align:center;margin-top:16px\">
            <strong>&#x1F449; <a href=\"{url}\" target=\"_blank\">View the full sales page</a></strong>
          </p>
          '''
          current_desc = p.get('description', '')
          # Only append if not already there
          if url not in current_desc:
              new_desc = current_desc + landing_html
              r2 = requests.put(
                  f'https://api.gumroad.com/v2/products/{pid}',
                  data={'access_token': token, 'description': new_desc}
              )
              d2 = r2.json()
              if d2.get('success'):
                  print('✅ Description updated with landing page link')
              else:
                  print('⚠️  Description update:', d2.get('message', d2))
          else:
              print('ℹ️  Landing page link already in description')

          print()
          print('Landing page live at:', url)
          print('Gumroad checkout:    ', p.get('short_url'))
          "

      - name: Deploy summary
        run: |
          echo "=================================="
          echo "  DOMINION EMPIRE — LANDING PAGE"
          echo "=================================="
          echo "Landing page : $LANDING_URL"
          echo "Gumroad buy  : https://singleton828.gumroad.com/l/$PRODUCT_ID"
          echo "=================================="
