name: Create Gumroad Product

on:
  workflow_dispatch:
    inputs:
      token_override:
        description: 'Gumroad access token'
        required: false
        type: string

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      GUMROAD_TOKEN: ${{ inputs.token_override || secrets.GUMROAD_TOKEN }}
      PRODUCT_NAME: "Divine Sovereignty Blueprint: Break Free, Heal Your Mindset & Build Your Empire"
      PRODUCT_PRICE: "4700"
    steps:
      - name: Create product on Gumroad
        run: |
          python3 -c "
          import os, requests, json

          token = os.environ['GUMROAD_TOKEN']
          name  = os.environ['PRODUCT_NAME']
          price = int(os.environ['PRODUCT_PRICE'])

          description = (
              'You were not created to struggle. You were created to reign.\n\n'
              'Divine Sovereignty Blueprint is the step-by-step system for breaking free '
              'from spiritual, mental, and financial limitations and stepping into the '
              'abundant life that was always meant for you.\n\n'
              'WHAT YOU GET INSIDE:\n'
              '* The 7 Pillars of Divine Sovereignty\n'
              '* Heal Your Money Story\n'
              '* The Empire Builder Mindset\n'
              '* Daily Activation Practices\n'
              '* Your 30-Day Dominion Action Plan\n\n'
              'Your destiny is dominion. This is where it starts.'
          )

          r = requests.post(
              'https://api.gumroad.com/v2/products',
              data={
                  'access_token': token,
                  'name': name,
                  'description': description,
                  'price': price,
                  'published': 'false',
              }
          )

          d = r.json()
          if d.get('success'):
              p = d['product']
              print('PRODUCT CREATED')
              print('  Name:  ' + p['name'])
              print('  Price: \$' + str(p['price']/100))
              print('  Edit:  https://app.gumroad.com/products/' + p['id'] + '/edit')
          else:
              print('FAILED: ' + str(d.get('message', d)))
              exit(1)
          "
