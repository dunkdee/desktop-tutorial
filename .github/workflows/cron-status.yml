name: Empire Status Snapshot

on:
  schedule: [{ cron: "*/30 * * * *" }]
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test gateway
        env:
          GATEWAY: ${{ secrets.N8N_AGENT_GATEWAY_URL }}
          N8N_TOOL_SECRET: ${{ secrets.N8N_TOOL_SECRET }}
        run: |
          if [ -z "${GATEWAY:-}" ]; then
            echo "N8N_AGENT_GATEWAY_URL not set — skipping snapshot"
            exit 0
          fi
          if [[ ! "$GATEWAY" =~ ^https?:// ]]; then
            echo "GATEWAY is not a valid URL — skipping snapshot"
            exit 0
          fi
          curl --fail --show-error --location --max-time 10 -X POST "${GATEWAY}" \
            -H "X-AGENT-KEY: ${N8N_TOOL_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"tool":"roi_snapshot","args":{"since":"7d","metrics":["revenue","orders"]}}' \
            > snapshot.json || { echo "Gateway unreachable — skipping"; exit 0; }
          echo "Snapshot result:" && cat snapshot.json
