name: Fix GCP SA Roles + Restart Baby-API

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Grant Vertex AI roles + restart baby-api
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            PROJECT="dominion-ascendant"
            SA_EMAIL="dominion-ai@dominion-ascendant.iam.gserviceaccount.com"

            echo "=============================="
            echo "  GRANT ROLES VIA ADC (compute SA)"
            echo "=============================="
            # Activate application default credentials (uses instance metadata)
            # This gives us the compute SA which typically has Editor/Owner role
            gcloud auth application-default login --no-launch-browser 2>/dev/null || true

            # Try granting with --impersonate-service-account using the compute SA
            COMPUTE_SA="288811801522-compute@developer.gserviceaccount.com"

            for ROLE in roles/aiplatform.user roles/ml.developer roles/storage.objectViewer; do
              echo "Granting $ROLE..."
              # Try directly first
              if gcloud projects add-iam-policy-binding "$PROJECT" \
                --member="serviceAccount:${SA_EMAIL}" \
                --role="$ROLE" \
                --quiet 2>/dev/null; then
                echo "  ✅ $ROLE granted"
              else
                # Try impersonating compute SA
                if gcloud projects add-iam-policy-binding "$PROJECT" \
                  --member="serviceAccount:${SA_EMAIL}" \
                  --role="$ROLE" \
                  --impersonate-service-account="$COMPUTE_SA" \
                  --quiet 2>/dev/null; then
                  echo "  ✅ $ROLE granted via impersonation"
                else
                  echo "  ⚠️  $ROLE — could not grant, check GCP Console permissions"
                fi
              fi
            done

            echo ""
            echo "=============================="
            echo "  DOCKER CONTAINERS"
            echo "=============================="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "docker ps failed"

            echo ""
            echo "=============================="
            echo "  RESTART BABY-API"
            echo "=============================="
            cd ~/desktop-tutorial

            # Try compose restart first
            if docker compose restart baby-api 2>/dev/null; then
              echo "✅ baby-api restarted via compose"
            else
              # Find container by port
              CONTAINER=$(docker ps --filter "publish=8080" --format "{{.Names}}" | head -1)
              if [ -n "$CONTAINER" ]; then
                docker restart "$CONTAINER" && echo "✅ restarted $CONTAINER"
              else
                # Rebuild
                docker compose up -d --force-recreate baby-api 2>/dev/null && echo "✅ baby-api recreated" || echo "⚠️  could not restart"
              fi
            fi

            echo ""
            echo "=============================="
            echo "  VERIFY BABY-API"
            echo "=============================="
            for i in $(seq 1 10); do
              sleep 5
              STATUS=$(curl -sf http://localhost:8080/ 2>/dev/null || true)
              if echo "$STATUS" | grep -q "LIVE"; then
                echo "✅ baby-api UP (attempt $i)"
                echo "$STATUS" | python3 -m json.tool 2>/dev/null || echo "$STATUS"
                break
              fi
              echo "  ... waiting (attempt $i/10)"
            done

            echo ""
            echo "=============================="
            echo "  CHECK SERVICE ACCOUNT ROLES"
            echo "=============================="
            gcloud projects get-iam-policy "$PROJECT" \
              --flatten="bindings[].members" \
              --filter="bindings.members:serviceAccount:${SA_EMAIL}" \
              --format="table(bindings.role)" 2>/dev/null || echo "Could not fetch IAM policy"
