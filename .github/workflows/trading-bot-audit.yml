name: Trading Bot Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit trading bot on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=============================="
            echo "  ~/dominion_trading/ CONTENTS"
            echo "=============================="
            ls -la ~/dominion_trading/ 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  IS paper_trade.py RUNNING?"
            echo "=============================="
            ps aux | grep paper_trade | grep -v grep || echo "NOT RUNNING"

            echo ""
            echo "=============================="
            echo "  ALL PYTHON PROCESSES"
            echo "=============================="
            ps aux | grep -E 'python|uvicorn|gunicorn' | grep -v grep || echo "none"

            echo ""
            echo "=============================="
            echo "  SYSTEMD: paper-trade TIMER"
            echo "=============================="
            systemctl status dominion-paper-trade.timer 2>/dev/null || echo "timer not found"

            echo ""
            echo "=============================="
            echo "  SYSTEMD: paper-trade SERVICE"
            echo "=============================="
            systemctl status dominion-paper-trade.service 2>/dev/null || echo "service not found"

            echo ""
            echo "=============================="
            echo "  paper_trade_state.json"
            echo "=============================="
            cat ~/dominion_trading/paper_trade_state.json 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  paper_trade_log.json (last 20 trades)"
            echo "=============================="
            tail -100 ~/dominion_trading/paper_trade_log.json 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  paper_trade.log (last 50 lines)"
            echo "=============================="
            tail -50 ~/dominion_trading/paper_trade.log 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  paper_trade.py (full source)"
            echo "=============================="
            cat ~/dominion_trading/paper_trade.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  BUDDY_CORE AGENTS"
            echo "=============================="
            ls -la ~/buddy_core/agents/ 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  OANDA BALANCE (via baby-api)"
            echo "=============================="
            curl -sf http://localhost:8080/oanda 2>/dev/null | python3 -m json.tool || echo "baby-api not responding"

            echo ""
            echo "=============================="
            echo "  ALL TRADING-NAMED FILES"
            echo "=============================="
            find ~ -maxdepth 6 \( -name '*trade*' -o -name '*trading*' -o -name '*oanda*' -o -name '*binance*' -o -name '*forex*' \) \
              -not -path '*/site-packages/*' \
              -not -path '*/lib/python*' \
              -not -path '*/__pycache__/*' \
              -not -path '*/.git/*' 2>/dev/null | sort

            echo ""
            echo "=============================="
            echo "  BROWSER-AGENTS STATUS"
            echo "=============================="
            docker ps --filter 'name=browser-agents' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null || echo "docker not available"
            curl -sf http://localhost:8081/health 2>/dev/null | python3 -m json.tool || echo "browser-agents not responding"
