name: Trading Bot Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit trading bot and state on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "=============================="
            echo "  ~/dominion_trading/ CONTENTS"
            echo "=============================="
            ls -la ~/dominion_trading/ 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  PAPER TRADE PROCESS STATUS"
            echo "=============================="
            ps aux | grep paper_trade | grep -v grep || echo "NOT RUNNING"

            echo ""
            echo "=============================="
            echo "  SYSTEMD TIMER STATUS"
            echo "=============================="
            systemctl status dominion-paper-trade.timer 2>/dev/null || echo "timer not found"
            systemctl status dominion-paper-trade.service 2>/dev/null || echo "service not found"

            echo ""
            echo "=============================="
            echo "  paper_trade_state.json"
            echo "=============================="
            cat ~/dominion_trading/paper_trade_state.json 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  LAST 60 LINES paper_trade.log"
            echo "=============================="
            tail -60 ~/dominion_trading/paper_trade.log 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  paper_trade.py (first 120 lines)"
            echo "=============================="
            head -120 ~/dominion_trading/paper_trade.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  OANDA BALANCE VIA BABY-API"
            echo "=============================="
            curl -sf http://localhost:8080/oanda 2>/dev/null || echo "baby-api /oanda not responding"

            echo ""
            echo "=============================="
            echo "  BUDDY_CORE AGENTS"
            echo "=============================="
            ls -la ~/buddy_core/agents/ 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  ALL TRADING FILES (excl venv)"
            echo "=============================="
            find ~ -maxdepth 5 \
              \( -name "*trade*" -o -name "*trading*" -o -name "*oanda*" -o -name "*binance*" \) \
              -not -path "*/site-packages/*" \
              -not -path "*/__pycache__/*" \
              -not -path "*/.git/*" 2>/dev/null | sort

            echo ""
            echo "=============================="
            echo "  ALL RUNNING PYTHON PROCS"
            echo "=============================="
            ps aux | grep python | grep -v grep || echo "none"

            echo ""
            echo "=============================="
            echo "  JURIS SERVICE STATUS"
            echo "=============================="
            systemctl status dominion-juris.service 2>/dev/null | head -20 || echo "service not found"
