name: Setup n8n Gumroad Webhook

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Import and activate Gumroad workflow in n8n
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 3m
          script: |
            cd ~/desktop-tutorial
            git pull origin main

            echo "=============================="
            echo "  FIND N8N CONTAINER"
            echo "=============================="
            N8N_CONTAINER=$(docker ps --filter "name=n8n" --format "{{.Names}}" 2>/dev/null | head -1)
            [ -z "$N8N_CONTAINER" ] && N8N_CONTAINER=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -i n8n | head -1)
            echo "n8n container: ${N8N_CONTAINER:-NOT FOUND}"
            [ -z "$N8N_CONTAINER" ] && { echo "Cannot find n8n container"; exit 1; }

            echo ""
            echo "=============================="
            echo "  WRITE WORKFLOW JSON"
            echo "=============================="
            python3 -c 'import json,os; r=os.path.expanduser("~/desktop-tutorial"); w=json.load(open(os.path.join(r,"n8n-workflows/gumroad-sale.json"))); w["active"]=True; open("/tmp/gw.json","w").write(json.dumps(w)); print("JSON written")'
            WF_ID=$(python3 -c 'import json; print(json.load(open("/tmp/gw.json"))["id"])')
            echo "Workflow ID: $WF_ID"

            echo ""
            echo "=============================="
            echo "  IMPORT WORKFLOW"
            echo "=============================="
            docker cp /tmp/gw.json ${N8N_CONTAINER}:/tmp/gw.json
            docker exec ${N8N_CONTAINER} n8n import:workflow --input=/tmp/gw.json 2>&1 || true

            echo ""
            echo "=============================="
            echo "  PUBLISH (ACTIVATE) WORKFLOW"
            echo "=============================="
            docker exec ${N8N_CONTAINER} n8n publish:workflow --id="${WF_ID}" 2>&1 || \
              docker exec ${N8N_CONTAINER} n8n update:workflow --id="${WF_ID}" --active=true 2>&1 || true
            echo "Publish done"

            echo ""
            echo "=============================="
            echo "  RESTART N8N TO APPLY"
            echo "=============================="
            docker restart ${N8N_CONTAINER}
            echo "Restarting..."
            sleep 8
            docker ps --filter "name=${N8N_CONTAINER}" --format "{{.Names}} {{.Status}}"

            echo ""
            echo "=============================="
            echo "  TEST WEBHOOK"
            echo "=============================="
            sleep 5
            RESULT=$(curl -sf -X POST "http://localhost:5678/webhook/gumroad-sale" \
              --data-urlencode "sale_id=TEST-001" \
              --data-urlencode "product_name=Divine Sovereignty Blueprint" \
              --data-urlencode "email=test@dominionhealing.org" \
              --data-urlencode "price=4700" \
              --data-urlencode "full_name=Test Customer" \
              --data-urlencode "test=true" \
              2>/dev/null || echo "WEBHOOK_NOT_RESPONDING")
            echo "Test result: $RESULT"

            echo ""
            echo "=============================="
            echo "  DONE"
            echo "=============================="
            echo "Webhook live: https://n8n.dominionhealing.org/webhook/gumroad-sale"
            echo ""
            echo "ONE STEP IN GUMROAD (UI only):"
            echo "  https://app.gumroad.com/settings/advanced"
            echo "  Ping URL = https://n8n.dominionhealing.org/webhook/gumroad-sale"
