name: Full VM Audit — Everything

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Complete VM state audit
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=============================="
            echo "  .ENV FILES (key names only)"
            echo "=============================="
            echo "--- ~/desktop-tutorial/.env ---"
            grep -oP '^[^=]+' ~/desktop-tutorial/.env 2>/dev/null | sort || echo "NOT FOUND"
            echo ""
            echo "--- ~/.env ---"
            grep -oP '^[^=]+' ~/.env 2>/dev/null | sort || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  CADDY CONFIG"
            echo "=============================="
            cat /etc/caddy/Caddyfile 2>/dev/null || sudo cat /etc/caddy/Caddyfile 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  CADDY SITES (if split config)"
            echo "=============================="
            ls /etc/caddy/sites-enabled/ 2>/dev/null || ls /etc/caddy/conf.d/ 2>/dev/null || echo "no split config dir"

            echo ""
            echo "=============================="
            echo "  DOCKER CONTAINERS"
            echo "=============================="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}" 2>/dev/null

            echo ""
            echo "=============================="
            echo "  DOCKER COMPOSE STATUS"
            echo "=============================="
            cd ~/desktop-tutorial && docker compose ps 2>/dev/null

            echo ""
            echo "=============================="
            echo "  BABY-API LIVE STATUS"
            echo "=============================="
            curl -sf http://localhost:8080/ 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "NOT RESPONDING"

            echo ""
            echo "=============================="
            echo "  DOMINION-WEB STATUS"
            echo "=============================="
            curl -sf http://localhost:8090/ 2>/dev/null | head -3 || echo "NOT RESPONDING"

            echo ""
            echo "=============================="
            echo "  N8N STATUS"
            echo "=============================="
            curl -sf http://localhost:5678/healthz 2>/dev/null || echo "n8n not on /healthz"
            curl -sf http://localhost:5678/ 2>/dev/null | head -2 || echo "n8n NOT RESPONDING on 5678"

            echo ""
            echo "=============================="
            echo "  ~/desktop-tutorial LAYOUT"
            echo "=============================="
            find ~/desktop-tutorial -maxdepth 3 \
              -not -path "*/.git/*" \
              -not -path "*/node_modules/*" \
              -not -path "*/__pycache__/*" 2>/dev/null | sort

            echo ""
            echo "=============================="
            echo "  ~/dominion TOP-LEVEL"
            echo "=============================="
            ls -la ~/dominion/ 2>/dev/null | head -40

            echo ""
            echo "=============================="
            echo "  ~/dominion SERVICES (systemd)"
            echo "=============================="
            find /etc/systemd/system -name "dominion*.service" -o -name "alchemist*.service" \
              -o -name "conductor*.service" -o -name "buddy*.service" \
              -o -name "surplus*.service" -o -name "juris*.service" 2>/dev/null | sort

            echo ""
            echo "=============================="
            echo "  RUNNING PYTHON PROCESSES"
            echo "=============================="
            ps aux | grep python | grep -v grep | awk '{print $1, $2, $11, $12, $13}' | head -30

            echo ""
            echo "=============================="
            echo "  ACTIVE PORTS"
            echo "=============================="
            ss -tlnp 2>/dev/null | grep -v "127.0.0.53" | head -40

            echo ""
            echo "=============================="
            echo "  GUMROAD IN EXISTING CODE"
            echo "=============================="
            grep -rl "gumroad\|GUMROAD" ~ \
              --include="*.py" --include="*.js" --include="*.env" \
              --exclude-dir=".git" --exclude-dir="site-packages" \
              --exclude-dir="node_modules" 2>/dev/null | sort

            echo ""
            echo "=============================="
            echo "  EMAIL/BREVO/SMTP IN EXISTING CODE"
            echo "=============================="
            grep -rl "brevo\|BREVO\|sendgrid\|mailgun\|smtp\|SMTP\|email_drip\|send_email" ~ \
              --include="*.py" --include="*.js" \
              --exclude-dir=".git" --exclude-dir="site-packages" \
              --exclude-dir="node_modules" 2>/dev/null | sort

            echo ""
            echo "=============================="
            echo "  ~/dominion/site or /app URLs"
            echo "=============================="
            find ~/dominion -name "*.py" -not -path "*/site-packages/*" \
              -not -path "*/__pycache__/*" 2>/dev/null \
              | xargs grep -l "app.route\|@router\|@app" 2>/dev/null | head -15
