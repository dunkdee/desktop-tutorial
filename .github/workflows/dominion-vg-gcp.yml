name: Build & Push Dominion Video Generator Images

on:
  workflow_dispatch:
  push:
    branches:
      - claude/movie-generator-youtube-b50wx2
    paths:
      - 'apps/dominion-vg/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  AR_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  AR_REPO: dominion

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Auth Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe "${{ env.AR_REPO }}" \
            --location "${{ env.REGION }}" \
          || gcloud artifacts repositories create "${{ env.AR_REPO }}" \
               --repository-format=docker \
               --location="${{ env.REGION }}" \
               --description="Dominion Empire images"

      - name: Build & push DVG image
        run: |
          IMAGE="${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/dominion-vg:latest"
          docker build -f apps/dominion-vg/Dockerfile -t "$IMAGE" apps/dominion-vg
          docker push "$IMAGE"

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/desktop-tutorial
            git fetch --all
            git checkout claude/movie-generator-youtube-b50wx2
            git reset --hard origin/claude/movie-generator-youtube-b50wx2

            export NVIDIA_NIM_API_KEY="${{ secrets.NVIDIA_NIM_API_KEY }}"
            export ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            export HIGGINS_API_KEY="${{ secrets.HIGGINS_SERVICE_KEY }}"
            export DVG_PUBLIC_URL="http://${{ secrets.VM_HOST }}:8002"
            export YOUTUBE_CLIENT_ID="${{ secrets.YOUTUBE_CLIENT_ID }}"
            export YOUTUBE_CLIENT_SECRET="${{ secrets.YOUTUBE_CLIENT_SECRET }}"
            export YOUTUBE_REDIRECT_URI="${{ secrets.YOUTUBE_REDIRECT_URI }}"

            docker compose up -d --build redis dominion-vg-api dominion-vg-worker movie-generator

            echo "Waiting for services..."
            sleep 10
            curl -sf http://localhost:8002/healthz && echo "Dominion VG: UP"
            curl -sf http://localhost:8001/healthz && echo "Higgins: UP"

      - name: Summary
        run: |
          echo "=================================="
          echo " Dominion Video Generator — LIVE"
          echo "=================================="
          echo " Cost: $0/month"
          echo " Video: NVIDIA Cosmos (free credits)"
          echo " Script: Claude Fable 5 (pay per use only)"
          echo " Redis: Local container (free)"
          echo " Host: Your existing VM (already paid)"
          echo "=================================="
