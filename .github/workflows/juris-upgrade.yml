name: Juris Upgrade - Remove Blockers + Fix Service

on:
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Upgrade Jurist on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "===== STEP 1: REMOVE JURIS BLOCKERS ====="
            PROTOCOL=~/buddy_core/core/juris_protocol.py
            if [ -f "$PROTOCOL" ]; then
              cp "$PROTOCOL" "${PROTOCOL}.bak"
              python3 -c "
import re
path = '$HOME/buddy_core/core/juris_protocol.py'
with open(path) as f: code = f.read()
code = re.sub(r'(veto_triggers\\s*=\\s*)\\[.*?\\]', r'\\1[]', code, flags=re.DOTALL)
code = re.sub(r'if any\\(.*?veto.*?\\).*?:[^\\n]*\\n[^\\n]*(raise|return)[^\\n]*', '# veto removed', code, flags=re.DOTALL)
with open(path, 'w') as f: f.write(code)
print('PATCHED')
"
              grep -n 'veto_triggers' "$PROTOCOL" | head -5
            else
              echo "NOT FOUND: $PROTOCOL"
            fi

            echo "===== STEP 2: FIX SYSTEMD SERVICE ====="
            PYTHON="/home/malachisingleton8/dominion_env/bin/python3"
            [ -f "$PYTHON" ] || PYTHON=$(which python3)
            echo "Using: $PYTHON"

            printf '[Unit]\nDescription=Juris Legal Intelligence API\nAfter=network.target\n\n[Service]\nType=simple\nUser=malachisingleton8\nWorkingDirectory=/home/malachisingleton8/dominion/agents/juris\nEnvironment=PYTHONPATH=/home/malachisingleton8/buddy_core:/home/malachisingleton8/dominion\nExecStartPre=/bin/bash -c "fuser -k 5055/tcp 2>/dev/null; fuser -k 5051/tcp 2>/dev/null; sleep 1"\nExecStart=%s /home/malachisingleton8/dominion/agents/juris/juris_api.py\nRestart=always\nRestartSec=10\n\n[Install]\nWantedBy=multi-user.target\n' "$PYTHON" | sudo tee /etc/systemd/system/dominion-juris.service > /dev/null

            echo "--- Service file ---"
            cat /etc/systemd/system/dominion-juris.service

            sudo systemctl daemon-reload
            sudo systemctl enable dominion-juris

            echo "===== STEP 3: RESTART JURIST ====="
            fuser -k 5055/tcp 2>/dev/null || true
            fuser -k 5051/tcp 2>/dev/null || true
            sleep 2
            sudo systemctl restart dominion-juris
            sleep 8
            systemctl status dominion-juris --no-pager | head -20

            echo "===== STEP 4: JOURNAL ====="
            journalctl -u dominion-juris -n 20 --no-pager 2>/dev/null || true

            systemctl is-active dominion-juris && echo "JURIS: ACTIVE" || echo "JURIS: FAILED"
            echo "UPGRADE DONE"
