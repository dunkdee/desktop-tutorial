name: Juris Upgrade - Remove Blockers + Fix Service

on:
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Upgrade Jurist on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "===== STEP 1: REMOVE JURIS BLOCKERS ====="
            PROTOCOL=$HOME/buddy_core/core/juris_protocol.py
            if [ -f "$PROTOCOL" ]; then
              cp "$PROTOCOL" "${PROTOCOL}.bak"
              sed -i 's/veto_triggers = \[.*\]/veto_triggers = []/g' "$PROTOCOL" || true
              python3 -c 'import re; path="'"'"'$HOME/buddy_core/core/juris_protocol.py'"'"'"; f=open(path); c=f.read(); f.close(); c=re.sub(r"veto_triggers\s*=\s*\[.*?\]", "veto_triggers = []", c, flags=re.DOTALL); open(path,"w").write(c); print("PATCHED")'
              grep -n 'veto_triggers' "$PROTOCOL" | head -3
            else
              echo "NOT FOUND: $PROTOCOL"
            fi

            echo "===== STEP 2: FIX SYSTEMD SERVICE ====="
            PYTHON=$HOME/dominion_env/bin/python3
            [ -f "$PYTHON" ] || PYTHON=$(which python3)
            echo "Python: $PYTHON"

            SERVICE_FILE=/etc/systemd/system/dominion-juris.service
            echo '[Unit]' | sudo tee $SERVICE_FILE
            echo 'Description=Juris Legal Intelligence API' | sudo tee -a $SERVICE_FILE
            echo 'After=network.target' | sudo tee -a $SERVICE_FILE
            echo '' | sudo tee -a $SERVICE_FILE
            echo '[Service]' | sudo tee -a $SERVICE_FILE
            echo 'Type=simple' | sudo tee -a $SERVICE_FILE
            echo 'User=malachisingleton8' | sudo tee -a $SERVICE_FILE
            echo 'WorkingDirectory=/home/malachisingleton8/dominion/agents/juris' | sudo tee -a $SERVICE_FILE
            echo 'Environment=PYTHONPATH=/home/malachisingleton8/buddy_core:/home/malachisingleton8/dominion' | sudo tee -a $SERVICE_FILE
            echo "ExecStart=$PYTHON /home/malachisingleton8/dominion/agents/juris/juris_api.py" | sudo tee -a $SERVICE_FILE
            echo 'Restart=always' | sudo tee -a $SERVICE_FILE
            echo 'RestartSec=10' | sudo tee -a $SERVICE_FILE
            echo '' | sudo tee -a $SERVICE_FILE
            echo '[Install]' | sudo tee -a $SERVICE_FILE
            echo 'WantedBy=multi-user.target' | sudo tee -a $SERVICE_FILE

            echo "--- Service file ---"
            cat $SERVICE_FILE
            sudo systemctl daemon-reload
            sudo systemctl enable dominion-juris

            echo "===== STEP 3: RESTART JURIST ====="
            fuser -k 5055/tcp 2>/dev/null || true
            fuser -k 5051/tcp 2>/dev/null || true
            sleep 2
            sudo systemctl restart dominion-juris
            sleep 8
            systemctl status dominion-juris --no-pager | head -20
            journalctl -u dominion-juris -n 20 --no-pager 2>/dev/null || true
            systemctl is-active dominion-juris && echo "JURIS: ACTIVE" || echo "JURIS: FAILED"
            echo "DONE"
