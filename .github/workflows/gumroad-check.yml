name: Gumroad Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Gumroad token and list products
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_TOKEN }}
        run: |
          echo "👑 Checking Gumroad..."
          echo "Token length: ${#GUMROAD_TOKEN} chars"

          HTTP_STATUS=$(curl -s -o /tmp/gumroad_resp.json -w "%{http_code}" \
            -H "Authorization: Bearer $GUMROAD_TOKEN" \
            https://api.gumroad.com/v2/products)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/gumroad_resp.json

          echo ""
          python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/gumroad_resp.json'))
          except Exception as e:
              print('Could not parse JSON:', e)
              sys.exit(1)

          if not data.get('success'):
              print('FAILED:', data.get('message', 'unknown error'))
              sys.exit(1)

          products = data.get('products', [])
          print(f'Token valid. Products found: {len(products)}')
          for p in products:
              status = 'PUBLISHED' if p.get('published') else 'draft'
              price = p.get('price', 0) / 100
              print(f'  [{status}] {p[\"name\"]} — \${price:.2f} — {p.get(\"short_url\",\"no url\")}')
          if not products:
              print('  No products yet — ready to create.')
          "

      - name: Check recent sales
        if: success()
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_TOKEN }}
        run: |
          echo ""
          echo "👑 Checking Gumroad sales..."
          curl -s -H "Authorization: Bearer $GUMROAD_TOKEN" \
            https://api.gumroad.com/v2/sales | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          sales = data.get('sales', [])
          total = sum(s.get('price',0) for s in sales) / 100
          print(f'Total sales: {len(sales)} — Revenue: \${total:.2f}')
          for s in sales[:5]:
              print(f'  {s.get(\"created_at\",\"?\")[:10]} — {s.get(\"product_name\")} — \${s.get(\"price\",0)/100:.2f}')
          "
