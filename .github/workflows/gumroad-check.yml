name: Gumroad Check

on:
  workflow_dispatch:
    inputs:
      token_override:
        description: 'Optional token override (leave blank to use stored secret)'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Gumroad API
        env:
          GUMROAD_TOKEN: ${{ inputs.token_override || secrets.GUMROAD_TOKEN }}
        run: |
          echo "Token length: ${#GUMROAD_TOKEN} chars"
          echo ""

          echo "=== Method 1: Bearer header ==="
          STATUS1=$(curl -s -o /tmp/r1.json -w "%{http_code}" \
            -H "Authorization: Bearer $GUMROAD_TOKEN" \
            https://api.gumroad.com/v2/products)
          echo "HTTP $STATUS1"
          cat /tmp/r1.json
          echo ""

          echo "=== Method 2: access_token query param ==="
          STATUS2=$(curl -s -o /tmp/r2.json -w "%{http_code}" \
            "https://api.gumroad.com/v2/products?access_token=$GUMROAD_TOKEN")
          echo "HTTP $STATUS2"
          cat /tmp/r2.json
          echo ""

          if [ "$STATUS1" = "200" ]; then
            echo "✅ Bearer method works"
            python3 -c "
          import json, sys
          data = json.load(open('/tmp/r1.json'))
          products = data.get('products', [])
          print(f'Products: {len(products)}')
          for p in products:
              s = 'PUBLISHED' if p.get('published') else 'draft'
              print(f'  [{s}] {p[\"name\"]} — \${p.get(\"price\",0)/100:.2f}')
          if not products:
              print('  No products yet')
          "
          elif [ "$STATUS2" = "200" ]; then
            echo "✅ Query param method works"
            python3 -c "
          import json, sys
          data = json.load(open('/tmp/r2.json'))
          products = data.get('products', [])
          print(f'Products: {len(products)}')
          for p in products:
              s = 'PUBLISHED' if p.get('published') else 'draft'
              print(f'  [{s}] {p[\"name\"]} — \${p.get(\"price\",0)/100:.2f}')
          if not products:
              print('  No products yet')
          "
          else
            echo "❌ Both methods failed — token may be invalid"
            exit 1
          fi
