name: Jurist Full Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Jurist code from VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=============================="
            echo "  dominion/agents/juris/ DIR"
            echo "=============================="
            ls -la ~/dominion/agents/juris/ 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  juris_api.py"
            echo "=============================="
            cat ~/dominion/agents/juris/juris_api.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  juris_brain.py"
            echo "=============================="
            cat ~/dominion/agents/juris/juris_brain.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  buddy_core/core/juris_protocol.py"
            echo "=============================="
            cat ~/buddy_core/core/juris_protocol.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  buddy_core/agents/juris/ DIR"
            echo "=============================="
            ls -la ~/buddy_core/agents/juris/ 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  buddy_core/agents/juris/juris_api.py"
            echo "=============================="
            cat ~/buddy_core/agents/juris/juris_api.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  buddy_core/agents/juris/juris_brain.py"
            echo "=============================="
            cat ~/buddy_core/agents/juris/juris_brain.py 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  juris_api.log (last 100 lines)"
            echo "=============================="
            tail -100 ~/juris_api.log 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=============================="
            echo "  buddy_core/checkpoints/juris"
            echo "=============================="
            ls -la ~/buddy_core/checkpoints/juris/ 2>/dev/null \
              || cat ~/buddy_core/checkpoints/juris 2>/dev/null \
              || echo "NOT FOUND"

            echo ""
            echo "JURIST FULL CODE PULL COMPLETE"
