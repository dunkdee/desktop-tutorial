name: Read Secrets from VM

on:
  workflow_dispatch:

jobs:
  read:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VM and show which secrets are present
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            ENV_FILE=~/desktop-tutorial/.env

            echo "=============================="
            echo " VM .env — keys present check"
            echo "=============================="

            check() {
              KEY="$1"
              VAL=$(grep "^${KEY}=" "$ENV_FILE" | cut -d= -f2-)
              if [ -n "$VAL" ]; then
                echo "✅ $KEY = SET (${#VAL} chars)"
              else
                echo "❌ $KEY = MISSING"
              fi
            }

            check GUMROAD_TOKEN
            check BREVO_API_KEY
            check YOUTUBE_API_KEY
            check OANDA_API_KEY
            check OANDA_ACCOUNT_ID
            check BINANCE_API_KEY
            check ANTHROPIC_API_KEY
            check GCP_PROJECT_ID
            check GCP_REGION
            check GOOGLE_SERVICE_ACCOUNT_JSON
            check GA4_MEASUREMENT_ID

            echo ""
            echo "To add a missing secret to GitHub:"
            echo "  Go to: github.com/dunkdee/desktop-tutorial/settings/secrets/actions"
            echo "  Click New repository secret, paste the value from this VM's .env"
