name: Sync Secrets from VM to GitHub

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Read .env from VM
        id: read_env
        run: |
          ZONE="us-central1-a"
          INSTANCE="foundation-vm"
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          USER="malachisingleton8"

          RAW=$(gcloud compute ssh "${USER}@${INSTANCE}" \
            --project="${PROJECT}" \
            --zone="${ZONE}" \
            --tunnel-through-iap \
            --command="cat ~/desktop-tutorial/.env" 2>/dev/null)

          # Extract individual values
          GA4=$(echo "$RAW" | grep '^GA4_MEASUREMENT_ID=' | cut -d= -f2-)
          GUMROAD=$(echo "$RAW" | grep '^GUMROAD_TOKEN=' | cut -d= -f2-)
          SA_JSON=$(echo "$RAW" | grep '^GOOGLE_SERVICE_ACCOUNT_JSON=' | cut -d= -f2-)

          # Mask values so they never appear in logs
          echo "::add-mask::$GA4"
          echo "::add-mask::$GUMROAD"
          echo "::add-mask::$SA_JSON"

          echo "ga4=$GA4"             >> "$GITHUB_OUTPUT"
          echo "gumroad=$GUMROAD"     >> "$GITHUB_OUTPUT"
          # SA JSON may contain special chars — write to temp file
          printf '%s' "$SA_JSON"      > /tmp/sa_json.txt

          # Report what was found (values are masked)
          [ -n "$GA4" ]      && echo "GA4_MEASUREMENT_ID        : found" || echo "GA4_MEASUREMENT_ID        : NOT FOUND in .env"
          [ -n "$GUMROAD" ]  && echo "GUMROAD_TOKEN             : found" || echo "GUMROAD_TOKEN             : NOT FOUND in .env"
          [ -n "$SA_JSON" ]  && echo "GOOGLE_SERVICE_ACCOUNT_JSON: found" || echo "GOOGLE_SERVICE_ACCOUNT_JSON: NOT FOUND in .env"

      - name: Push secrets to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GA4_VAL: ${{ steps.read_env.outputs.ga4 }}
          GUMROAD_VAL: ${{ steps.read_env.outputs.gumroad }}
        run: |
          REPO="dunkdee/desktop-tutorial"

          [ -n "$GA4_VAL" ] && \
            gh secret set GA4_MEASUREMENT_ID --body "$GA4_VAL" --repo "$REPO" && \
            echo "✅ GA4_MEASUREMENT_ID set" || \
            echo "⏭️  GA4_MEASUREMENT_ID skipped (empty)"

          [ -n "$GUMROAD_VAL" ] && \
            gh secret set GUMROAD_TOKEN --body "$GUMROAD_VAL" --repo "$REPO" && \
            echo "✅ GUMROAD_TOKEN set" || \
            echo "⏭️  GUMROAD_TOKEN skipped (empty)"

          SA=$(cat /tmp/sa_json.txt)
          [ -n "$SA" ] && \
            gh secret set GOOGLE_SERVICE_ACCOUNT_JSON --body "$SA" --repo "$REPO" && \
            echo "✅ GOOGLE_SERVICE_ACCOUNT_JSON set" || \
            echo "⏭️  GOOGLE_SERVICE_ACCOUNT_JSON skipped (empty)"

          echo ""
          echo "Done. Trigger baby.yml to redeploy with updated secrets."
