name: Add Vault Path to dominionhealing.org

on:
  workflow_dispatch:

jobs:
  patch-caddy:
    runs-on: ubuntu-latest
    steps:
      - name: Route /vault on dominionhealing.org to baby-api
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            CADDYFILE=/etc/caddy/Caddyfile

            echo "=============================="
            echo "  CURRENT CADDYFILE"
            echo "=============================="
            cat "$CADDYFILE"
            echo ""

            echo "=============================="
            echo "  CHECK IF ALREADY PATCHED"
            echo "=============================="
            if grep -q "handle /vault" "$CADDYFILE" 2>/dev/null; then
              echo "ALREADY PATCHED — done"
              curl -sf http://localhost:8080/vault/health | python3 -m json.tool 2>/dev/null || true
              exit 0
            fi

            echo ""
            echo "=============================="
            echo "  PATCH CADDYFILE"
            echo "=============================="

            if grep -qP "^dominionhealing\.org\s*\{" "$CADDYFILE" 2>/dev/null; then
              echo "Root block exists — patching with awk"
              awk '/^dominionhealing\.org[[:space:]]*\{$/ {
                in_root=1; print; next
              }
              in_root && /reverse_proxy/ && !patched {
                print "  handle /vault* {";
                print "    reverse_proxy 127.0.0.1:8080";
                print "  }";
                print "  handle /health {";
                print "    reverse_proxy 127.0.0.1:8080";
                print "  }";
                print "  handle {";
                patched=1; in_handle=1
              }
              in_root && /^\}/ && in_handle {
                print "  }"; in_handle=0; in_root=0; patched=0; print; next
              }
              { print }' "$CADDYFILE" > /tmp/Caddyfile.patched
            else
              echo "No root block — appending new vault block"
              cp "$CADDYFILE" /tmp/Caddyfile.patched
              printf '\ndominionhealing.org {\n  encode gzip zstd\n  handle /vault* {\n    reverse_proxy 127.0.0.1:8080\n  }\n  handle /health {\n    reverse_proxy 127.0.0.1:8080\n  }\n}\n' >> /tmp/Caddyfile.patched
            fi

            echo ""
            echo "=============================="
            echo "  DIFF"
            echo "=============================="
            diff "$CADDYFILE" /tmp/Caddyfile.patched || true

            echo ""
            echo "=============================="
            echo "  APPLY + RELOAD CADDY"
            echo "=============================="
            sudo cp /tmp/Caddyfile.patched "$CADDYFILE"
            sudo systemctl reload caddy && echo "Caddy reloaded OK" || {
              echo "ERROR — Caddy status:"
              sudo systemctl status caddy | tail -20
              exit 1
            }

            echo ""
            echo "=============================="
            echo "  VERIFY"
            echo "=============================="
            sleep 2
            curl -sf http://localhost:8080/vault/health | python3 -m json.tool 2>/dev/null || echo "(vault health via direct port)"
            echo ""
            sudo systemctl is-active caddy
            echo ""
            echo "DONE: https://dominionhealing.org/vault/health"
