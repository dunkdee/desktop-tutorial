name: Add Vault Path to dominionhealing.org

on:
  workflow_dispatch:

jobs:
  patch-caddy:
    runs-on: ubuntu-latest
    steps:
      - name: Insert /vault routing into existing dominionhealing.org block
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            CADDYFILE=/etc/caddy/Caddyfile

            echo "=============================="
            echo "  ALREADY PATCHED CHECK"
            echo "=============================="
            if grep -q "@vault_path" "$CADDYFILE" 2>/dev/null; then
              echo "ALREADY PATCHED — done"
              curl -sf http://localhost:8080/vault/health | python3 -m json.tool 2>/dev/null || true
              exit 0
            fi

            echo ""
            echo "=============================="
            echo "  CURRENT ROOT BLOCK"
            echo "=============================="
            grep -n "dominionhealing.org\|root \*\|file_server\|@vault" "$CADDYFILE" | head -30

            echo ""
            echo "=============================="
            echo "  PATCH: INSERT VAULT BEFORE root * LINE"
            echo "=============================="
            cp "$CADDYFILE" /tmp/Caddyfile.bak
            sudo sed -i 's|  root \* /home/|  @vault_path {\n    path /vault /vault/ /vault/*\n  }\n  reverse_proxy @vault_path 127.0.0.1:8080\n\n  root * /home/|' "$CADDYFILE"

            echo ""
            echo "=============================="
            echo "  DIFF"
            echo "=============================="
            diff /tmp/Caddyfile.bak "$CADDYFILE" || true

            echo ""
            echo "=============================="
            echo "  RELOAD CADDY"
            echo "=============================="
            sudo systemctl reload caddy && echo "Caddy reloaded OK" || {
              echo "RELOAD FAILED — restoring backup"
              sudo cp /tmp/Caddyfile.bak "$CADDYFILE"
              sudo systemctl reload caddy
              echo "Restored original — check logs above for Caddy error"
              exit 1
            }

            echo ""
            echo "=============================="
            echo "  VERIFY"
            echo "=============================="
            sleep 2
            curl -sf http://localhost:8080/vault/health | python3 -m json.tool 2>/dev/null || echo "(vault health via direct port)"
            echo ""
            sudo systemctl is-active caddy
            echo ""
            echo "DONE: https://dominionhealing.org/vault/health"
