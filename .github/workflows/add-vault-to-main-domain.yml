name: Add Vault Path to dominionhealing.org

on:
  workflow_dispatch:

jobs:
  patch-caddy:
    runs-on: ubuntu-latest
    steps:
      - name: Remove duplicate dominionhealing.org block and reload Caddy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            CADDYFILE=/etc/caddy/Caddyfile

            echo "=============================="
            echo "  CURRENT CADDYFILE (key lines)"
            echo "=============================="
            grep -n "dominionhealing.org\|vault\|@vault" "$CADDYFILE" | head -40

            echo ""
            echo "=============================="
            echo "  CHECK FOR DUPLICATE BLOCK"
            echo "=============================="
            DUP_LINE=$(grep -n "^dominionhealing\.org {" "$CADDYFILE" | tail -1 | cut -d: -f1)
            if [ -z "$DUP_LINE" ]; then
              echo "No duplicate simple block found"
            else
              echo "Duplicate block at line $DUP_LINE — removing it"
              cp "$CADDYFILE" /tmp/Caddyfile.bak2
              head -n $((DUP_LINE - 2)) "$CADDYFILE" > /tmp/Caddyfile.fixed
              echo "" >> /tmp/Caddyfile.fixed
              echo "--- After removing duplicate ---"
              grep -n "dominionhealing.org\|vault" /tmp/Caddyfile.fixed | head -20
              sudo cp /tmp/Caddyfile.fixed "$CADDYFILE"
              echo "Applied fix"
            fi

            echo ""
            echo "=============================="
            echo "  CONFIRM VAULT PATH IN BLOCK"
            echo "=============================="
            if grep -q "@vault_path" "$CADDYFILE"; then
              echo "OK — @vault_path already in Caddyfile"
            else
              echo "Vault path not found — inserting before root * line"
              sudo sed -i 's|  root \* /home/|  @vault_path {\n    path /vault /vault/ /vault/*\n  }\n  reverse_proxy @vault_path 127.0.0.1:8080\n\n  root * /home/|' "$CADDYFILE"
              echo "Inserted vault routing"
            fi

            echo ""
            echo "=============================="
            echo "  RELOAD CADDY"
            echo "=============================="
            sudo systemctl reload caddy && echo "Caddy reloaded OK" || {
              echo "RELOAD FAILED — Caddy error:"
              sudo caddy validate --config "$CADDYFILE" 2>&1 | tail -10
              exit 1
            }

            echo ""
            echo "=============================="
            echo "  VERIFY"
            echo "=============================="
            sleep 2
            curl -sf http://localhost:8080/vault/health | python3 -m json.tool 2>/dev/null || echo "(vault health via direct port OK)"
            echo ""
            sudo systemctl is-active caddy
            echo ""
            echo "DONE — vault is at: https://dominionhealing.org/vault/health"
