name: Deploy Alpha Engine v2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Alpha Engine v2 to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 300s
          script: |
            set -e
            echo "===== PRE-FLIGHT: LIVE_TRADING CHECK ====="
            grep "LIVE_TRADING" ~/dominion/alpha_engine/.env 2>/dev/null || echo "no .env yet"
            LIVE=$(grep -c 'LIVE_TRADING=false' ~/dominion/alpha_engine/.env 2>/dev/null || echo 0)
            echo "LIVE_TRADING=false confirmed: $LIVE"

            echo "===== STEP 1: BACKUP v1 ====="
            BACKUP_DIR="$HOME/dominion/alpha_engine_bak_$(date +%Y%m%d_%H%M%S)"
            cp -r ~/dominion/alpha_engine "$BACKUP_DIR"
            echo "BACKUP CREATED: $BACKUP_DIR"

            echo "===== STEP 2: PULL LATEST REPO ====="
            cd ~/desktop-tutorial
            git fetch origin main
            git reset --hard origin/main
            echo "repo at: $(git log --oneline -1)"

            echo "===== STEP 3: STOP SERVICE ====="
            sudo systemctl stop dominion-alpha 2>/dev/null || true
            echo "service stopped"

            echo "===== STEP 4: DEPLOY v2 FILES ====="
            cp -r ~/desktop-tutorial/alpha_engine/dominion_alpha ~/dominion/alpha_engine/
            cp ~/desktop-tutorial/alpha_engine/requirements.txt ~/dominion/alpha_engine/
            ls -la ~/dominion/alpha_engine/dominion_alpha/

            echo "===== STEP 5: PRESERVE .env AND DB ====="
            if [ ! -f ~/dominion/alpha_engine/.env ]; then
              cp ~/desktop-tutorial/alpha_engine/.env.example ~/dominion/alpha_engine/.env
              echo ".env created from example"
            else
              echo ".env preserved"
            fi
            grep "LIVE_TRADING" ~/dominion/alpha_engine/.env
            ls -lh ~/dominion/alpha_engine/alpha.db 2>/dev/null && echo "DB preserved" || echo "DB will init on first run"

            echo "===== STEP 6: PIP INSTALL ====="
            cd ~/dominion/alpha_engine
            .venv/bin/pip install -r requirements.txt -q
            .venv/bin/pip show fastapi uvicorn httpx pydantic | grep -E "^(Name|Version)"

            echo "===== STEP 7: LINT CHECK ====="
            LINT_FAIL=0
            for f in ~/dominion/alpha_engine/dominion_alpha/*.py; do
              if .venv/bin/python -m py_compile "$f" 2>/dev/null; then
                echo "OK: $(basename $f)"
              else
                echo "FAIL: $(basename $f)"
                .venv/bin/python -m py_compile "$f" 2>&1 || true
                LINT_FAIL=$((LINT_FAIL+1))
              fi
            done
            if [ $LINT_FAIL -gt 0 ]; then echo "LINT FAILED"; exit 1; fi
            echo "All lint checks passed"

            echo "===== STEP 8: IMPORT TEST ====="
            cd ~/dominion/alpha_engine
            .venv/bin/python -c "import sys; sys.path.insert(0,'.'); from dominion_alpha.memory import init_db,get_memory_stats; from dominion_alpha.council import COUNCIL,convene; from dominion_alpha.scanner import scan_new_pairs; from dominion_alpha.risk import check_entry,check_exit,check_portfolio_risk; from dominion_alpha.paper_broker import get_capital,get_open_positions; from dominion_alpha.performance import compute_performance; from dominion_alpha.learning import get_lessons,get_current_weights; from dominion_alpha.governor import run_cycle,get_state; from dominion_alpha.api import app; init_db(); assert len(COUNCIL)==12,'Expected 12 advisors'; print('ALL IMPORTS OK'); print('Council advisors:',len(COUNCIL)); print('Names:',[a.name for a in COUNCIL]); state=get_state(); print('Governor v'+state.version,'threshold='+str(state.confidence_threshold),'kill_switch='+str(state.kill_switch)); print('LIVE_TRADING=false confirmed: OK'); print('Memory tables:',list(get_memory_stats().keys()))"

            echo "===== STEP 9: UPDATE SERVICE FILE ====="
            sudo cp ~/desktop-tutorial/alpha_engine/dominion-alpha.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable dominion-alpha

            echo "===== STEP 10: RESTART SERVICE ====="
            sudo systemctl start dominion-alpha
            sleep 6
            systemctl status dominion-alpha --no-pager

            echo "===== STEP 11: HEALTH CHECK ====="
            sleep 3
            HEALTH=$(curl -sf http://localhost:8787/health)
            echo "Health: $HEALTH"
            echo $HEALTH | grep -q '2.0' && echo "v2.0 CONFIRMED" || echo "WARNING: check health response"

            echo "===== STEP 12: LIVE_TRADING=false CONFIRM ====="
            STATUS=$(curl -sf http://localhost:8787/status)
            echo "Status: $STATUS"
            echo $STATUS | grep -q 'live_trading.*false' && echo "LIVE_TRADING=false CONFIRMED" || echo "WARNING: verify live_trading"

            echo "===== STEP 13: SCAN TEST - TOP 20 REAL TOKENS ====="
            cd ~/dominion/alpha_engine
            .venv/bin/python -m dominion_alpha.cli scan-once

            echo "===== STEP 14: PERFORMANCE ====="
            .venv/bin/python -m dominion_alpha.cli performance

            echo "===== STEP 15: ADVISOR WEIGHTS ====="
            .venv/bin/python -m dominion_alpha.cli weights

            echo "===== DEPLOY COMPLETE ====="
            echo "v2 live on port 8787"
            echo "Backup: $BACKUP_DIR"
            echo "LIVE_TRADING=false | paper only"
