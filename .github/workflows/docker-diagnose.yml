name: Docker Diagnose — baby-api Logs + Status

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Get docker state and baby-api logs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "=============================="
            echo "  ALL CONTAINERS (docker ps -a)"
            echo "=============================="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}" 2>/dev/null

            echo ""
            echo "=============================="
            echo "  BABY-API LOGS (last 60 lines)"
            echo "=============================="
            docker logs baby-api --tail=60 2>&1 || echo "No container named baby-api"

            echo ""
            echo "=============================="
            echo "  DOCKER COMPOSE PS"
            echo "=============================="
            cd ~/desktop-tutorial
            docker compose ps 2>/dev/null

            echo ""
            echo "=============================="
            echo "  DOCKER COMPOSE CONFIG (env vars for baby-api)"
            echo "=============================="
            docker inspect baby-api 2>/dev/null \
              | python3 -c "import json,sys; data=json.load(sys.stdin); env=data[0].get('Config',{}).get('Env',[]); [print(e) for e in env if any(k in e for k in ['GOOGLE','ANTHROPIC','OANDA','BINANCE','GCP','FLASK'])]" \
              || echo "Could not inspect container"

            echo ""
            echo "=============================="
            echo "  .ENV FILE (key names only, no values)"
            echo "=============================="
            cd ~/desktop-tutorial
            grep -oP '^[^=]+' .env 2>/dev/null | sort || echo ".env not found"

            echo ""
            echo "=============================="
            echo "  CURL BABY-API"
            echo "=============================="
            curl -sv http://localhost:8080/ 2>&1 | tail -20 || echo "Connection failed"
