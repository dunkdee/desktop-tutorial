version: "3.9"

services:
  baby-api:
    build: ./api
    container_name: baby-api
    working_dir: /app
    volumes:
      - ./api:/app
      - ${VAULT_PATH:-/home/malachisingleton8/vault}:/vault
    command: ["python", "app.py"]
    ports:
      - "8080:8080"
    restart: always
    environment:
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GUMROAD_TOKEN: ${GUMROAD_TOKEN}
      OANDA_API_KEY: ${OANDA_API_KEY}
      OANDA_ACCOUNT_ID: ${OANDA_ACCOUNT_ID}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION:-us-central1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID:-G-8DXWMYHNY2}
      VAULT_PATH: /vault
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/\").read(); print(\"OK\")' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  baby-logger:
    image: alpine:latest
    container_name: baby-logger
    command: ["sh", "-c", "while true; do echo 'Baby heartbeat: empire integrations running'; sleep 30; done"]
    restart: always

  browser-agents:
    build: ./apps/browser-agents
    container_name: browser-agents
    ports:
      - "8081:8000"
    shm_size: '2gb'
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TIKTOK_USERNAME: ${TIKTOK_USERNAME}
      TIKTOK_PASSWORD: ${TIKTOK_PASSWORD}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD}
      TWITTER_USERNAME: ${TWITTER_USERNAME}
      TWITTER_PASSWORD: ${TWITTER_PASSWORD}
      PPH_USERNAME: ${PPH_USERNAME}
      PPH_PASSWORD: ${PPH_PASSWORD}
      BABY_API_URL: http://baby-api:8080
      PPH_MAX_PROPOSALS_PER_RUN: ${PPH_MAX_PROPOSALS_PER_RUN:-3}
      PPH_MIN_BUDGET: ${PPH_MIN_BUDGET:-50}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  dominion-web:
    build: ./web
    container_name: dominion-web
    ports:
      - "8090:80"
    restart: always
    environment:
      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID:-G-8DXWMYHNY2}
